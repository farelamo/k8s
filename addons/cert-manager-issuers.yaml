---
# ============================================================
# ClusterIssuers untuk Let's Encrypt
# Apply SETELAH cert-manager running
# ============================================================

# Staging Issuer (untuk testing, no rate limit)
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    # Staging server - gunakan ini dulu untuk testing
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: "${ACME_EMAIL}"
    privateKeySecretRef:
      name: letsencrypt-staging-key
    solvers:
    # HTTP-01 challenge via Traefik
    - http01:
        ingress:
          ingressClassName: traefik

---
# Production Issuer
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-production
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: "${ACME_EMAIL}"
    privateKeySecretRef:
      name: letsencrypt-production-key
    solvers:
    # HTTP-01 challenge via Traefik
    - http01:`q
        ingress:
          ingressClassName: traefik

