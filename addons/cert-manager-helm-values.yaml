# ============================================================
# cert-manager Helm Values
#
# Install:
#   helm repo add jetstack https://charts.jetstack.io
#   helm install cert-manager jetstack/cert-manager \
#     --namespace cert-manager --create-namespace \
#     -f cert-manager-helm-values.yaml
# ============================================================

# Install CRDs via Helm
installCRDs: true

# Replicas
replicaCount: 2

# Resources
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi

# Webhook
webhook:
  replicaCount: 2
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

# CA Injector
cainjector:
  replicaCount: 1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

# Prometheus metrics
prometheus:
  enabled: true
  servicemonitor:
    enabled: false  # set true jika pakai Prometheus Operator

# Pod Disruption Budget
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# DNS resolver untuk ACME challenges
# Gunakan Google Cloud DNS jika pakai DNS-01 challenge
global:
  leaderElection:
    namespace: cert-manager
