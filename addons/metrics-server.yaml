---
# ============================================================
# Metrics Server - Required untuk HPA
# Deploy di workload cluster
# ============================================================
apiVersion: addons.cluster.x-k8s.io/v1beta1
kind: ClusterResourceSet
metadata:
  name: metrics-server-crs
  namespace: default
spec:
  clusterSelector:
    matchLabels:
      cluster.x-k8s.io/cluster-name: fariz-workload-cluster
  resources:
  - name: metrics-server-install
    kind: ConfigMap
  strategy: ApplyOnce

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: metrics-server-install
  namespace: default
data:
  metrics-server.yaml: |
    apiVersion: v1
    kind: ServiceAccount
    metadata:
      name: metrics-server
      namespace: kube-system
    ---
    apiVersion: rbac.authorization.k8s.io/v1
    kind: ClusterRole
    metadata:
      name: system:aggregated-metrics-reader
    rules:
    - apiGroups: ["metrics.k8s.io"]
      resources: ["pods", "nodes"]
      verbs: ["get", "list", "watch"]
    ---
    apiVersion: rbac.authorization.k8s.io/v1
    kind: ClusterRoleBinding
    metadata:
      name: metrics-server:system:auth-delegator
    roleRef:
      apiGroup: rbac.authorization.k8s.io
      kind: ClusterRole
      name: system:auth-delegator
    subjects:
    - kind: ServiceAccount
      name: metrics-server
      namespace: kube-system
    ---
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: metrics-server
      namespace: kube-system
      labels:
        k8s-app: metrics-server
    spec:
      replicas: 1
      selector:
        matchLabels:
          k8s-app: metrics-server
      template:
        metadata:
          labels:
            k8s-app: metrics-server
        spec:
          serviceAccountName: metrics-server
          containers:
          - name: metrics-server
            image: registry.k8s.io/metrics-server/metrics-server:v0.7.0
            args:
            - --cert-dir=/tmp
            - --secure-port=10250
            - --kubelet-preferred-address-types=InternalIP,ExternalIP,Hostname
            - --kubelet-use-node-status-port
            - --metric-resolution=15s
            ports:
            - containerPort: 10250
              name: https
              protocol: TCP
            resources:
              requests:
                cpu: 100m
                memory: 200Mi
              limits:
                cpu: 250m
                memory: 512Mi
            livenessProbe:
              httpGet:
                path: /livez
                port: https
                scheme: HTTPS
              periodSeconds: 10
              failureThreshold: 3
            readinessProbe:
              httpGet:
                path: /readyz
                port: https
                scheme: HTTPS
              periodSeconds: 10
              failureThreshold: 3
    ---
    apiVersion: v1
    kind: Service
    metadata:
      name: metrics-server
      namespace: kube-system
      labels:
        kubernetes.io/name: "Metrics-server"
    spec:
      selector:
        k8s-app: metrics-server
      ports:
      - port: 443
        targetPort: https
        protocol: TCP
    ---
    apiVersion: apiregistration.k8s.io/v1
    kind: APIService
    metadata:
      name: v1beta1.metrics.k8s.io
    spec:
      service:
        name: metrics-server
        namespace: kube-system
      group: metrics.k8s.io
      version: v1beta1
      insecureSkipTLSVerify: true
      groupPriorityMinimum: 100
      versionPriority: 100
