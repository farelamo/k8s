---
# ============================================================
# Traefik Ingress Controller
# Deploy di workload cluster via ClusterResourceSet
# ============================================================
apiVersion: addons.cluster.x-k8s.io/v1beta1
kind: ClusterResourceSet
metadata:
  name: traefik-crs
  namespace: default
spec:
  clusterSelector:
    matchLabels:
      cluster.x-k8s.io/cluster-name: fariz-workload-cluster
  resources:
  - name: traefik-install
    kind: ConfigMap
  strategy: ApplyOnce

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: traefik-install
  namespace: default
data:
  traefik.yaml: |
    # Namespace
    apiVersion: v1
    kind: Namespace
    metadata:
      name: traefik
    ---
    # ServiceAccount
    apiVersion: v1
    kind: ServiceAccount
    metadata:
      name: traefik
      namespace: traefik
    ---
    # ClusterRole
    apiVersion: rbac.authorization.k8s.io/v1
    kind: ClusterRole
    metadata:
      name: traefik
    rules:
    - apiGroups: [""]
      resources: ["services", "endpoints", "secrets"]
      verbs: ["get", "list", "watch"]
    - apiGroups: [""]
      resources: ["services/status"]
      verbs: ["update"]
    - apiGroups: ["extensions", "networking.k8s.io"]
      resources: ["ingresses", "ingressclasses"]
      verbs: ["get", "list", "watch"]
    - apiGroups: ["extensions", "networking.k8s.io"]
      resources: ["ingresses/status"]
      verbs: ["update"]
    - apiGroups: ["traefik.io"]
      resources: ["ingressroutes", "ingressroutetcps", "ingressrouteudps",
                   "middlewares", "middlewaretcps", "tlsoptions", "tlsstores",
                   "traefikservices", "serverstransports", "serverstransporttcps"]
      verbs: ["get", "list", "watch"]
    ---
    # ClusterRoleBinding
    apiVersion: rbac.authorization.k8s.io/v1
    kind: ClusterRoleBinding
    metadata:
      name: traefik
    roleRef:
      apiGroup: rbac.authorization.k8s.io
      kind: ClusterRole
      name: traefik
    subjects:
    - kind: ServiceAccount
      name: traefik
      namespace: traefik
    ---
    # Traefik CRDs - IngressRoute
    apiVersion: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    metadata:
      name: ingressroutes.traefik.io
    spec:
      group: traefik.io
      names:
        kind: IngressRoute
        listKind: IngressRouteList
        plural: ingressroutes
        singular: ingressroute
      scope: Namespaced
      versions:
      - name: v1alpha1
        served: true
        storage: true
        schema:
          openAPIV3Schema:
            type: object
            x-kubernetes-preserve-unknown-fields: true
    ---
    # Traefik CRDs - Middleware
    apiVersion: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    metadata:
      name: middlewares.traefik.io
    spec:
      group: traefik.io
      names:
        kind: Middleware
        listKind: MiddlewareList
        plural: middlewares
        singular: middleware
      scope: Namespaced
      versions:
      - name: v1alpha1
        served: true
        storage: true
        schema:
          openAPIV3Schema:
            type: object
            x-kubernetes-preserve-unknown-fields: true
    ---
    # Traefik CRDs - TLSOption
    apiVersion: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    metadata:
      name: tlsoptions.traefik.io
    spec:
      group: traefik.io
      names:
        kind: TLSOption
        listKind: TLSOptionList
        plural: tlsoptions
        singular: tlsoption
      scope: Namespaced
      versions:
      - name: v1alpha1
        served: true
        storage: true
        schema:
          openAPIV3Schema:
            type: object
            x-kubernetes-preserve-unknown-fields: true
    ---
    # Traefik CRDs - IngressRouteTCP
    apiVersion: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    metadata:
      name: ingressroutetcps.traefik.io
    spec:
      group: traefik.io
      names:
        kind: IngressRouteTCP
        listKind: IngressRouteTCPList
        plural: ingressroutetcps
        singular: ingressroutetcp
      scope: Namespaced
      versions:
      - name: v1alpha1
        served: true
        storage: true
        schema:
          openAPIV3Schema:
            type: object
            x-kubernetes-preserve-unknown-fields: true
    ---
    # Traefik CRDs - IngressRouteUDP
    apiVersion: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    metadata:
      name: ingressrouteudps.traefik.io
    spec:
      group: traefik.io
      names:
        kind: IngressRouteUDP
        listKind: IngressRouteUDPList
        plural: ingressrouteudps
        singular: ingressrouteudp
      scope: Namespaced
      versions:
      - name: v1alpha1
        served: true
        storage: true
        schema:
          openAPIV3Schema:
            type: object
            x-kubernetes-preserve-unknown-fields: true
    ---
    # Traefik CRDs - TraefikService
    apiVersion: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    metadata:
      name: traefikservices.traefik.io
    spec:
      group: traefik.io
      names:
        kind: TraefikService
        listKind: TraefikServiceList
        plural: traefikservices
        singular: traefikservice
      scope: Namespaced
      versions:
      - name: v1alpha1
        served: true
        storage: true
        schema:
          openAPIV3Schema:
            type: object
            x-kubernetes-preserve-unknown-fields: true
    ---
    # Traefik CRDs - ServerTransport
    apiVersion: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    metadata:
      name: serverstransports.traefik.io
    spec:
      group: traefik.io
      names:
        kind: ServersTransport
        listKind: ServersTransportList
        plural: serverstransports
        singular: serverstransport
      scope: Namespaced
      versions:
      - name: v1alpha1
        served: true
        storage: true
        schema:
          openAPIV3Schema:
            type: object
            x-kubernetes-preserve-unknown-fields: true
    ---
    # Deployment
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: traefik
      namespace: traefik
      labels:
        app.kubernetes.io/name: traefik
    spec:
      replicas: 2
      selector:
        matchLabels:
          app.kubernetes.io/name: traefik
      strategy:
        type: RollingUpdate
        rollingUpdate:
          maxSurge: 1
          maxUnavailable: 0
      template:
        metadata:
          labels:
            app.kubernetes.io/name: traefik
        spec:
          serviceAccountName: traefik
          terminationGracePeriodSeconds: 60
          containers:
          - name: traefik
            image: traefik:v3.1
            args:
            - --global.checknewversion=false
            - --global.sendanonymoususage=false
            # Entrypoints
            - --entrypoints.web.address=:80
            - --entrypoints.websecure.address=:443
            # HTTP -> HTTPS redirect
            - --entrypoints.web.http.redirections.entryPoint.to=websecure
            - --entrypoints.web.http.redirections.entryPoint.scheme=https
            # Providers
            - --providers.kubernetesingress=true
            - --providers.kubernetesingress.ingressclass=traefik
            - --providers.kubernetescrd=true
            # API/Dashboard
            - --api.dashboard=true
            - --api.insecure=true
            # Logs
            - --log.level=INFO
            - --accesslog=true
            - --accesslog.format=json
            # Metrics
            - --metrics.prometheus=true
            - --metrics.prometheus.entryPoint=metrics
            - --entrypoints.metrics.address=:9100
            # Health
            - --ping=true
            - --ping.entryPoint=traefik
            - --entrypoints.traefik.address=:9000
            ports:
            - name: web
              containerPort: 80
              protocol: TCP
            - name: websecure
              containerPort: 443
              protocol: TCP
            - name: traefik
              containerPort: 9000
              protocol: TCP
            - name: metrics
              containerPort: 9100
              protocol: TCP
            resources:
              requests:
                cpu: 100m
                memory: 128Mi
              limits:
                cpu: 500m
                memory: 512Mi
            livenessProbe:
              httpGet:
                path: /ping
                port: 9000
              initialDelaySeconds: 10
              periodSeconds: 10
            readinessProbe:
              httpGet:
                path: /ping
                port: 9000
              initialDelaySeconds: 10
              periodSeconds: 10
            securityContext:
              readOnlyRootFilesystem: true
              runAsNonRoot: true
              runAsUser: 65532
              runAsGroup: 65532
              capabilities:
                drop: ["ALL"]
                add: ["NET_BIND_SERVICE"]
    ---
    # Service - LoadBalancer (GCP akan provision Network LB)
    apiVersion: v1
    kind: Service
    metadata:
      name: traefik
      namespace: traefik
      labels:
        app.kubernetes.io/name: traefik
      annotations:
        # GCP specific: gunakan Network Load Balancer (L4)
        cloud.google.com/l4-rbs: "enabled"
    spec:
      type: LoadBalancer
      externalTrafficPolicy: Local
      selector:
        app.kubernetes.io/name: traefik
      ports:
      - name: web
        port: 80
        targetPort: web
        protocol: TCP
      - name: websecure
        port: 443
        targetPort: websecure
        protocol: TCP
    ---
    # Service - Metrics (untuk Prometheus scraping)
    apiVersion: v1
    kind: Service
    metadata:
      name: traefik-metrics
      namespace: traefik
      labels:
        app.kubernetes.io/name: traefik
    spec:
      type: ClusterIP
      selector:
        app.kubernetes.io/name: traefik
      ports:
      - name: metrics
        port: 9100
        targetPort: metrics
        protocol: TCP
    ---
    # IngressClass
    apiVersion: networking.k8s.io/v1
    kind: IngressClass
    metadata:
      name: traefik
      annotations:
        ingressclass.kubernetes.io/is-default-class: "true"
    spec:
      controller: traefik.io/ingress-controller
    ---
    # PodDisruptionBudget
    apiVersion: policy/v1
    kind: PodDisruptionBudget
    metadata:
      name: traefik
      namespace: traefik
    spec:
      minAvailable: 1
      selector:
        matchLabels:
          app.kubernetes.io/name: traefik
    ---
    # Dashboard IngressRoute (internal only)
    apiVersion: traefik.io/v1alpha1
    kind: IngressRoute
    metadata:
      name: traefik-dashboard
      namespace: traefik
    spec:
      entryPoints:
      - traefik
      routes:
      - match: PathPrefix(`/dashboard`) || PathPrefix(`/api`)
        kind: Rule
        services:
        - name: api@internal
          kind: TraefikService
