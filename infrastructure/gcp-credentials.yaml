---
# Template untuk GCP Credentials Secret
# JANGAN commit file ini dengan credentials asli!
# Gunakan script 01-setup-gcp.sh untuk generate credentials
#
# Cara membuat secret:
#   kubectl create secret generic gcp-credentials \
#     --from-file=credentials.json=./credentials/gcp-sa-key.json
#
apiVersion: v1
kind: Secret
metadata:
  name: gcp-credentials
  namespace: capg-system
  labels:
    cluster.x-k8s.io/provider: infrastructure-gcp
type: Opaque
data:
  # base64 encoded service account JSON key
  # generate: base64 -w0 ./credentials/gcp-sa-key.json
  credentials.json: "${GCP_B64ENCODED_CREDENTIALS}"
