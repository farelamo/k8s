---
# Jenkins Configuration as Code (JCasC)
# Auto-configure Jenkins tanpa manual setup di UI
apiVersion: v1
kind: ConfigMap
metadata:
  name: jenkins-casc
  namespace: jenkins
  labels:
    app.kubernetes.io/name: jenkins
data:
  jenkins.yaml: |
    jenkins:
      systemMessage: "Jenkins on Kubernetes - Managed by CasC"
      numExecutors: 0
      mode: EXCLUSIVE

      securityRealm:
        local:
          allowsSignup: false
          users:
          - id: "admin"
            password: "${JENKINS_ADMIN_PASSWORD:-admin123}"

      authorizationStrategy:
        loggedInUsersCanDoAnything:
          allowAnonymousRead: false

      clouds:
      - kubernetes:
          name: "kubernetes"
          serverUrl: "https://kubernetes.default.svc"
          namespace: "jenkins"
          jenkinsUrl: "http://jenkins.jenkins.svc.cluster.local:8080"
          jenkinsTunnel: "jenkins-agent.jenkins.svc.cluster.local:50000"
          connectTimeout: 5
          readTimeout: 15
          containerCapStr: "20"
          maxRequestsPerHostStr: "32"
          retentionTimeout: 5

          templates:
          # Default agent
          - name: "default"
            label: "default"
            nodeUsageMode: NORMAL
            serviceAccount: "jenkins"
            containers:
            - name: "jnlp"
              image: "jenkins/inbound-agent:latest-jdk17"
              workingDir: "/home/jenkins/agent"
              resourceRequestCpu: "500m"
              resourceRequestMemory: "512Mi"
              resourceLimitCpu: "1"
              resourceLimitMemory: "1Gi"
            yamlMergeStrategy: "override"
            idleMinutes: 5
            activeDeadlineSeconds: 3600

          # Docker builder (Kaniko)
          - name: "docker"
            label: "docker"
            nodeUsageMode: EXCLUSIVE
            serviceAccount: "jenkins"
            containers:
            - name: "jnlp"
              image: "jenkins/inbound-agent:latest-jdk17"
              workingDir: "/home/jenkins/agent"
              resourceRequestCpu: "200m"
              resourceRequestMemory: "256Mi"
            - name: "kaniko"
              image: "gcr.io/kaniko-project/executor:debug"
              command: "/busybox/sleep"
              args: "infinity"
              workingDir: "/home/jenkins/agent"
              resourceRequestCpu: "1"
              resourceRequestMemory: "1Gi"
              resourceLimitCpu: "2"
              resourceLimitMemory: "2Gi"
            volumes:
            - name: "docker-config"
              secretName: "gcr-credentials"
              mountPath: "/kaniko/.docker"
            yamlMergeStrategy: "override"
            idleMinutes: 3
            activeDeadlineSeconds: 7200

          # Node.js builder
          - name: "nodejs"
            label: "nodejs"
            nodeUsageMode: EXCLUSIVE
            serviceAccount: "jenkins"
            containers:
            - name: "jnlp"
              image: "jenkins/inbound-agent:latest-jdk17"
              workingDir: "/home/jenkins/agent"
              resourceRequestCpu: "200m"
              resourceRequestMemory: "256Mi"
            - name: "node"
              image: "node:20-alpine"
              command: "/bin/sh"
              args: "-c cat"
              ttyEnabled: true
              workingDir: "/home/jenkins/agent"
              resourceRequestCpu: "500m"
              resourceRequestMemory: "512Mi"
              resourceLimitCpu: "2"
              resourceLimitMemory: "2Gi"
            yamlMergeStrategy: "override"
            idleMinutes: 5

          # Go builder
          - name: "golang"
            label: "golang"
            nodeUsageMode: EXCLUSIVE
            serviceAccount: "jenkins"
            containers:
            - name: "jnlp"
              image: "jenkins/inbound-agent:latest-jdk17"
              workingDir: "/home/jenkins/agent"
              resourceRequestCpu: "200m"
              resourceRequestMemory: "256Mi"
            - name: "golang"
              image: "golang:1.22-alpine"
              command: "/bin/sh"
              args: "-c cat"
              ttyEnabled: true
              workingDir: "/home/jenkins/agent"
              resourceRequestCpu: "1"
              resourceRequestMemory: "1Gi"
              resourceLimitCpu: "2"
              resourceLimitMemory: "2Gi"
            yamlMergeStrategy: "override"
            idleMinutes: 5

          # kubectl deployer
          - name: "deployer"
            label: "deployer"
            nodeUsageMode: EXCLUSIVE
            serviceAccount: "jenkins"
            containers:
            - name: "jnlp"
              image: "jenkins/inbound-agent:latest-jdk17"
              workingDir: "/home/jenkins/agent"
              resourceRequestCpu: "200m"
              resourceRequestMemory: "256Mi"
            - name: "kubectl"
              image: "bitnami/kubectl:latest"
              command: "/bin/sh"
              args: "-c cat"
              ttyEnabled: true
              workingDir: "/home/jenkins/agent"
              resourceRequestCpu: "200m"
              resourceRequestMemory: "256Mi"
            yamlMergeStrategy: "override"
            idleMinutes: 3

    unclassified:
      location:
        url: "https://jenkins.yourdomain.com/"
        adminAddress: "admin@yourdomain.com"

      globalLibraries:
        libraries:
        - name: "shared-pipeline"
          defaultVersion: "main"
          retriever:
            modernSCM:
              scm:
                git:
                  remote: "https://github.com/your-org/jenkins-shared-library.git"

    jobs:
    - script: |
        folder('apps') {
          description('Application pipelines')
        }
