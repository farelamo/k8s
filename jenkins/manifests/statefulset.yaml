---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: jenkins
  namespace: jenkins
  labels:
    app.kubernetes.io/name: jenkins
    app.kubernetes.io/component: master
spec:
  serviceName: jenkins
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: jenkins
      app.kubernetes.io/component: master
  template:
    metadata:
      labels:
        app.kubernetes.io/name: jenkins
        app.kubernetes.io/component: master
    spec:
      serviceAccountName: jenkins
      securityContext:
        fsGroup: 1000
        runAsUser: 1000
        runAsNonRoot: true
      initContainers:
      - name: install-plugins
        image: jenkins/jenkins:lts-jdk17
        command:
        - jenkins-plugin-cli
        - --plugins
        - kubernetes
        - workflow-aggregator
        - git
        - configuration-as-code
        - docker-workflow
        - credentials-binding
        - pipeline-stage-view
        - blueocean
        - prometheus
        - job-dsl
        volumeMounts:
        - name: jenkins-home
          mountPath: /var/jenkins_home
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: "1"
            memory: 1Gi
      containers:
      - name: jenkins
        image: jenkins/jenkins:lts-jdk17
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        - name: agent
          containerPort: 50000
          protocol: TCP
        env:
        - name: JAVA_OPTS
          value: >-
            -Xmx2g
            -Xms512m
            -Djenkins.install.runSetupWizard=false
            -Dcasc.jenkins.config=/var/jenkins_home/casc_configs
        - name: CASC_JENKINS_CONFIG
          value: /var/jenkins_home/casc_configs
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: "2"
            memory: 4Gi
        livenessProbe:
          httpGet:
            path: /login
            port: 8080
          initialDelaySeconds: 90
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 5
        readinessProbe:
          httpGet:
            path: /login
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        volumeMounts:
        - name: jenkins-home
          mountPath: /var/jenkins_home
        - name: casc-config
          mountPath: /var/jenkins_home/casc_configs
      volumes:
      - name: jenkins-home
        persistentVolumeClaim:
          claimName: jenkins-home
      - name: casc-config
        configMap:
          name: jenkins-casc
