---
# Service untuk Web UI
apiVersion: v1
kind: Service
metadata:
  name: jenkins
  namespace: jenkins
  labels:
    app.kubernetes.io/name: jenkins
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: jenkins
    app.kubernetes.io/component: master
  ports:
  - name: http
    port: 8080
    targetPort: http
    protocol: TCP

---
# Service untuk Agent connection (JNLP)
apiVersion: v1
kind: Service
metadata:
  name: jenkins-agent
  namespace: jenkins
  labels:
    app.kubernetes.io/name: jenkins
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: jenkins
    app.kubernetes.io/component: master
  ports:
  - name: agent
    port: 50000
    targetPort: agent
    protocol: TCP
