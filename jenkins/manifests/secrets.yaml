---
# GCR/Artifact Registry credentials untuk Kaniko
#
# Buat secret via CLI (JANGAN edit file ini langsung):
#   kubectl create secret generic gcr-credentials \
#     --namespace jenkins \
#     --from-file=config.json=./credentials/docker-config.json
#
# Generate docker-config.json dari service account:
#   cat credentials/gcp-sa-key.json | \
#     jq -r '{auths: {"asia-southeast2-docker.pkg.dev": {username: "_json_key", password: (. | tostring)}}}' \
#     > credentials/docker-config.json
#
apiVersion: v1
kind: Secret
metadata:
  name: gcr-credentials
  namespace: jenkins
  labels:
    app.kubernetes.io/name: jenkins
type: Opaque
# data.config.json — generate via command di atas
