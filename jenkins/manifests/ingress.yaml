---
# TLS Certificate via cert-manager
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: jenkins-tls
  namespace: jenkins
spec:
  secretName: jenkins-tls-cert
  issuerRef:
    name: letsencrypt-production
    kind: ClusterIssuer
  dnsNames:
  - jenkins-fariz.pcsindonesia.com

---
# IngressRoute via Traefik
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: jenkins
  namespace: jenkins
  labels:
    app.kubernetes.io/name: jenkins
spec:
  entryPoints:
  - websecure
  routes:
  - match: Host(`jenkins-fariz.pcsindonesia.com`)
    kind: Rule
    services:
    - name: jenkins
      port: 8080
    middlewares:
    - name: jenkins-headers
    - name: jenkins-ratelimit
  tls:
    secretName: jenkins-tls-cert

---
# Security headers
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: jenkins-headers
  namespace: jenkins
spec:
  headers:
    stsSeconds: 31536000
    stsIncludeSubdomains: true
    contentTypeNosniff: true
    browserXssFilter: true
    frameDeny: false
    customFrameOptionsValue: "SAMEORIGIN"

---
# Rate limit
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: jenkins-ratelimit
  namespace: jenkins
spec:
  rateLimit:
    average: 200
    burst: 400
    period: 1m
